
<!DOCTYPE html>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Outfit:wght@300;400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Outfit',sans-serif;
  min-height:600px;
  background:#050d1a;
  overflow:hidden;
  position:relative;
}

.scene{
  width:100%;
  min-height:600px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.bg-gradient{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(234,88,12,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 40%, rgba(14,165,233,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 50% 100%, rgba(251,146,60,0.08) 0%, transparent 50%),
    #050d1a;
}

.aurora{
  position:absolute;inset:0;
  background:linear-gradient(105deg, transparent 30%, rgba(234,88,12,0.05) 50%, transparent 70%);
  animation:auroraMove 8s ease-in-out infinite alternate;
}
@keyframes auroraMove{
  from{transform:translateX(-10%) skewX(-5deg);}
  to{transform:translateX(10%) skewX(5deg);}
}

/* ── ROAD ── */
.road-wrap{
  position:absolute;
  bottom:0; left:0; right:0;
  height:140px;
  overflow:hidden;
}
.road{
  position:absolute;
  bottom:0; left:0; right:0;
  height:80px;
  background:linear-gradient(180deg, #0f1c2e 0%, #111c2d 100%);
  border-top:2px solid rgba(255,255,255,0.06);
}
.road-line{
  position:absolute;
  top:38px; left:-120px;
  width:120px; height:4px;
  background:linear-gradient(90deg, transparent, #f97316, transparent);
  border-radius:2px;
  animation:roadLine 1.8s linear infinite;
}
.road-line:nth-child(2){animation-delay:-0.6s;}
.road-line:nth-child(3){animation-delay:-1.2s;}
@keyframes roadLine{
  from{left:-120px;}
  to{left:calc(100% + 120px);}
}
.lane-dash{
  position:absolute;
  top:36px; left:-80px;
  width:60px; height:3px;
  background:rgba(255,200,0,0.25);
  border-radius:2px;
  animation:laneDash 1.2s linear infinite;
}
.lane-dash:nth-child(5){animation-delay:-0.4s;}
.lane-dash:nth-child(6){animation-delay:-0.8s;}
@keyframes laneDash{
  from{left:-80px;}
  to{left:calc(100% + 80px);}
}

/* ── TRUCK ── */
.truck-wrap{
  position:absolute;
  bottom:80px;
  left:-260px;
  animation:truckDrive 7s cubic-bezier(0.25,0.1,0.25,1) infinite;
  z-index:5;
}
@keyframes truckDrive{
  0%  {left:-260px; opacity:0;}
  8%  {opacity:1;}
  45% {left:calc(50% - 130px);}
  55% {left:calc(50% - 130px);}
  92% {opacity:1; left:calc(100% + 20px);}
  100%{left:calc(100% + 20px); opacity:0;}
}
.truck-body{animation:truckBounce 0.35s ease-in-out infinite alternate;}
@keyframes truckBounce{
  from{transform:translateY(0);}
  to{transform:translateY(-2px);}
}
.puff{
  position:absolute;
  right:-4px; top:4px;
  width:8px; height:8px;
  background:rgba(200,200,200,0.45);
  border-radius:50%;
  animation:puffAnim 0.7s ease-out infinite;
}
.puff:nth-child(2){animation-delay:-0.23s; width:6px; height:6px;}
.puff:nth-child(3){animation-delay:-0.46s; width:5px; height:5px;}
@keyframes puffAnim{
  0%  {transform:translate(0,0) scale(1); opacity:0.5;}
  100%{transform:translate(14px,-10px) scale(2.2); opacity:0;}
}
.wheel{animation:wheelSpin 0.4s linear infinite; transform-origin:center;}
@keyframes wheelSpin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
.beam{
  position:absolute;
  left:100%; top:14px;
  width:0; height:0;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-left:30px solid rgba(255,240,100,0.15);
  transform-origin:left center;
  filter:blur(3px);
}

/* ── PARTICLES ── */
.particle{
  position:absolute;
  width:3px; height:3px;
  background:rgba(249,115,22,0.6);
  border-radius:50%;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%  {transform:translateY(0) scale(1); opacity:0.6;}
  100%{transform:translateY(-300px) scale(0); opacity:0;}
}

/* ── BLOBS ── */
.blob{position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none;}
.blob1{width:300px;height:300px;background:rgba(234,88,12,0.12);top:-60px;left:-80px;animation:blobDrift 12s ease-in-out infinite alternate;}
.blob2{width:220px;height:220px;background:rgba(14,165,233,0.08);bottom:60px;right:-40px;animation:blobDrift 9s ease-in-out infinite alternate-reverse;}
@keyframes blobDrift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(20px,15px) scale(1.08);}
}

/* ── GLASS CARD ── */
.glass-card{
  position:relative;
  z-index:20;
  width:400px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  padding:38px 36px 32px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 40px 80px rgba(0,0,0,0.5),
    0 0 60px rgba(234,88,12,0.08);
  animation:cardReveal 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s both;
}
@keyframes cardReveal{
  from{opacity:0; transform:translateY(28px) scale(0.96);}
  to{opacity:1; transform:translateY(0) scale(1);}
}
.card-glow-line{
  position:absolute;
  top:0; left:20%; right:20%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(249,115,22,0.7), transparent);
  border-radius:1px;
}

/* ── LOGO ── */
.logo-row{
  display:flex; align-items:center; gap:10px;
  margin-bottom:26px;
  animation:fadeUp 0.6s ease-out 0.4s both;
}
.logo-badge{
  width:38px; height:38px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 16px rgba(249,115,22,0.4);
}
.logo-badge i{color:#fff; font-size:18px;}
.logo-text{
  font-family:'Syne',sans-serif;
  font-size:20px; font-weight:800;
  color:#fff; letter-spacing:-0.5px;
}
.logo-text span{color:#f97316;}

/* ── HEADER ── */
.form-eyebrow{
  font-size:11px; letter-spacing:1.5px;
  text-transform:uppercase;
  color:#f97316; margin-bottom:5px;
  animation:fadeUp 0.6s ease-out 0.5s both;
}
.form-title{
  font-family:'Syne',sans-serif;
  font-size:25px; font-weight:700;
  color:#fff; line-height:1.2;
  letter-spacing:-0.5px;
  margin-bottom:5px;
  animation:fadeUp 0.6s ease-out 0.55s both;
}
.form-sub{
  font-size:13px; color:rgba(255,255,255,0.32);
  margin-bottom:26px;
  animation:fadeUp 0.6s ease-out 0.6s both;
}

/* ── FIELDS ── */
.field{margin-bottom:14px;}
.field label{
  display:block; font-size:12px;
  color:rgba(255,255,255,0.45);
  margin-bottom:6px; letter-spacing:0.3px;
}
.input-wrap{position:relative; display:flex; align-items:center;}
.input-wrap i{
  position:absolute; left:13px;
  font-size:16px; color:rgba(255,255,255,0.25);
  pointer-events:none; transition:color 0.2s;
}
.input-wrap input{
  width:100%;
  padding:11px 13px 11px 38px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  color:#fff; font-size:13px;
  font-family:'Outfit',sans-serif;
  outline:none;
  transition:border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.input-wrap input:focus{
  border-color:rgba(249,115,22,0.55);
  background:rgba(249,115,22,0.04);
  box-shadow:0 0 0 3px rgba(249,115,22,0.08);
}
.input-wrap input:focus + i,
.input-wrap:focus-within i{color:rgba(249,115,22,0.7);}
.input-wrap input::placeholder{color:rgba(255,255,255,0.18);}

/* eye toggle */
.eye-toggle{
  position:absolute; right:12px;
  background:none; border:none;
  cursor:pointer; padding:0;
  color:rgba(255,255,255,0.2);
  font-size:16px; transition:color 0.2s;
  display:flex; align-items:center;
}
.eye-toggle:hover{color:rgba(255,255,255,0.5);}

/* ── FORGOT ── */
.forgot-row{
  display:flex; justify-content:flex-end;
  margin-top:-4px; margin-bottom:22px;
  animation:fadeUp 0.6s ease-out 0.78s both;
}
.forgot{
  font-size:12px; color:rgba(249,115,22,0.65);
  cursor:pointer; transition:color 0.2s;
  background:none; border:none;
  font-family:'Outfit',sans-serif;
}
.forgot:hover{color:#f97316;}

/* ── CTA ── */
.cta-btn{
  width:100%; padding:13px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  border:none; border-radius:12px;
  color:#fff; font-size:14px;
  font-family:'Syne',sans-serif;
  font-weight:700; cursor:pointer;
  letter-spacing:0.3px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
  box-shadow:0 0 24px rgba(249,115,22,0.3), 0 4px 16px rgba(0,0,0,0.3);
  transition:transform 0.15s, box-shadow 0.15s;
  animation:fadeUp 0.6s ease-out 0.85s both;
}
.cta-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 0 36px rgba(249,115,22,0.45), 0 6px 20px rgba(0,0,0,0.4);
}
.cta-btn:active{transform:scale(0.98);}
.shimmer{
  position:absolute; inset:0;
  background:linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.18) 50%, transparent 65%);
  animation:shimmerPass 2.5s linear infinite;
}
@keyframes shimmerPass{
  from{transform:translateX(-100%);}
  to{transform:translateX(200%);}
}

/* ── STATUS BADGE ── */
.status-badge{
  position:absolute; top:-13px; right:20px;
  background:rgba(16,185,129,0.12);
  border:1px solid rgba(16,185,129,0.22);
  border-radius:20px;
  padding:4px 12px;
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:#34d399;
  backdrop-filter:blur(8px);
}
.live-dot{
  width:6px; height:6px;
  background:#10b981; border-radius:50%;
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(16,185,129,0.4);}
  50%{opacity:0.5; box-shadow:0 0 0 4px rgba(16,185,129,0);}
}

/* ── TRACK DOTS ── */
.track-dots{
  display:flex; gap:4px; align-items:center;
  margin-top:20px; justify-content:center;
  animation:fadeUp 0.6s ease-out 0.95s both;
}
.tdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1);}
.tdot.active{background:#f97316;width:18px;border-radius:3px;box-shadow:0 0 8px rgba(249,115,22,0.5);}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(14px);}
  to{opacity:1; transform:translateY(0);}
}

/* stagger fields */
.f1{animation:fadeUp 0.6s ease-out 0.65s both;}
.f2{animation:fadeUp 0.6s ease-out 0.72s both;}
.f3{animation:fadeUp 0.6s ease-out 0.79s both;}
</style>

<script>
function togglePass(){
  const inp = document.getElementById('inp-pass');
  const icon = document.getElementById('eye-icon');
  if(inp.type === 'password'){
    inp.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

function handleLogin(){
  const u = document.getElementById('inp-user').value.trim();
  const e = document.getElementById('inp-email').value.trim();
  const p = document.getElementById('inp-pass').value.trim();
  const btn = document.querySelector('.cta-btn');
  const label = document.getElementById('btn-label');

  if(!u || !e || !p){
    btn.style.background = 'linear-gradient(135deg,#dc2626,#b91c1c)';
    btn.style.boxShadow = '0 0 24px rgba(220,38,38,0.3)';
    label.textContent = 'Fill all fields to continue';
    setTimeout(()=>{
      btn.style.background = 'linear-gradient(135deg,#f97316,#ea580c)';
      btn.style.boxShadow = '0 0 24px rgba(249,115,22,0.3), 0 4px 16px rgba(0,0,0,0.3)';
      label.textContent = 'Sign in to Bonzer';
    }, 2000);
    return;
  }

  label.textContent = 'Authenticating…';
  btn.style.opacity = '0.75';
  btn.style.cursor = 'not-allowed';
  setTimeout(()=>{
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
    btn.style.background = 'linear-gradient(135deg,#16a34a,#15803d)';
    btn.style.boxShadow = '0 0 24px rgba(22,163,74,0.35)';
    label.textContent = '✓ Signed in successfully';
  }, 1600);
}
</script>
