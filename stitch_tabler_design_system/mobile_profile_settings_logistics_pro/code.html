<script>
        // Micro-interaction for Appearance Toggle
        const toggleBtn = document.querySelector('[onclick*="dark"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                const dot = this.querySelector('.dot');
                const bg = this.querySelector('div:first-child');
                const isDark = document.documentElement.classList.contains('dark');
                
                if (isDark) {
                    dot.classList.add('translate-x-5');
                    bg.classList.remove('bg-outline-variant');
                    bg.classList.add('bg-primary');
                } else {
                    dot.classList.remove('translate-x-5');
                    bg.classList.add('bg-outline-variant');
                    bg.classList.remove('bg-primary');
                }
            });
        }
    </script>
